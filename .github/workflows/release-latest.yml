name: Release Latest

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build ${{ matrix.binary }} ${{ matrix.target }}
    runs-on: ubuntu-22.04
    container:
      image: ${{ matrix.container_image }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - binary: sccache
            target: x86_64-unknown-linux-musl
            container_image: messense/rust-musl-cross:x86_64-musl
            extra_args: ""
          - binary: sccache-dist
            target: x86_64-unknown-linux-musl
            container_image: messense/rust-musl-cross:x86_64-musl
            extra_args: --no-default-features --features=dist-server
          - binary: sccache
            target: aarch64-unknown-linux-musl
            container_image: messense/rust-musl-cross:aarch64-musl
            extra_args: ""
    steps:
      - name: Clone repository
        uses: actions/checkout@v5

      - name: Extract version from Cargo.toml
        id: version
        run: |
          VERSION=$(cargo pkgid | cut -d# -f2 | cut -d: -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Install zstd
        run: |
          apt-get update
          apt-get install -y zstd

      - name: Build static binary
        run: |
          cargo build --locked --release --bin ${{ matrix.binary }} --target ${{ matrix.target }} --features=openssl/vendored ${{ matrix.extra_args }}
          ASSET=${{ matrix.binary }}-${{ steps.version.outputs.version }}-${{ matrix.target }}.zst
          zstd -T0 -19 target/${{ matrix.target }}/release/${{ matrix.binary }} -o "$ASSET"
          sha256sum "$ASSET" > "$ASSET.sha256"
        env:
          CARGO_PROFILE_RELEASE_LTO: true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}-${{ matrix.target }}
          path: |
            ${{ matrix.binary }}-${{ steps.version.outputs.version }}-${{ matrix.target }}.zst
            ${{ matrix.binary }}-${{ steps.version.outputs.version }}-${{ matrix.target }}.zst.sha256

  release:
    name: Create or Update Release
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Clone repository
        uses: actions/checkout@v5

      - name: Extract version from Cargo.toml
        id: version
        run: |
          VERSION=$(cargo pkgid | cut -d# -f2 | cut -d: -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create or Update Latest Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release v${{ steps.version.outputs.version }}
          body: |
            Release v${{ steps.version.outputs.version }} from main branch

            Commit: ${{ github.sha }}
            Build Date: ${{ github.event.head_commit.timestamp }}

            Automatically generated release with static Linux musl binaries for x86_64 and aarch64.
          files: artifacts/*
          prerelease: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
